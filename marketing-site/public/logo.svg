<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 40"
  fill="none"
  role="img"
  aria-label="CUIT — complex-ui-tester"
>
  <title>CUIT</title>

  <!--
    LOOP MARK — 36×36 viewport, centered at (18,18).
    Strategy: two overlapping arcs on the same circle (r=13).
    Circumference = 2π×13 ≈ 81.68

    The circle starts at top (12 o'clock) with rotate(-90 18 18).
    RED dashes cover the FIRST 38% ≈ 31 units: dash 3.8 gap 3.2 × ~4 repetitions
    GREEN solid covers the LAST 62% ≈ 50.7 units, offset back by 31 units.

    Both circles share the same coordinate system.
    A knockout overdraw in #0a0a0b erases cross-bleed.
  -->

  <!-- Phosphor ambient glow — oscilloscope tube atmosphere -->
  <circle cx="18" cy="18" r="15.5"
    stroke="#22c55e" stroke-width="8" stroke-opacity="0.05" fill="none"/>

  <!-- RED dashed segment (failing trace — top-left arc, ~38% of loop) -->
  <circle cx="18" cy="18" r="13"
    stroke="#ef4444" stroke-width="2.4" stroke-linecap="round"
    stroke-dasharray="3.8 3.2"
    pathLength="81.68"
    transform="rotate(-90 18 18)"
  />

  <!-- Knockout: paint over everything after the first 31 units with bg color -->
  <circle cx="18" cy="18" r="13"
    stroke="#0a0a0b" stroke-width="3.2" stroke-linecap="butt"
    stroke-dasharray="50.68 31"
    stroke-dashoffset="-31"
    pathLength="81.68"
    transform="rotate(-90 18 18)"
  />

  <!-- GREEN solid segment (passing trace — bottom-right arc, ~62% of loop) -->
  <!-- Outer phosphor glow first -->
  <circle cx="18" cy="18" r="13"
    stroke="#22c55e" stroke-width="7" stroke-opacity="0.12" stroke-linecap="round"
    stroke-dasharray="50.68 31"
    stroke-dashoffset="-31"
    pathLength="81.68"
    transform="rotate(-90 18 18)"
  />
  <!-- Main green stroke -->
  <circle cx="18" cy="18" r="13"
    stroke="#22c55e" stroke-width="2.4" stroke-linecap="round"
    stroke-dasharray="50.68 31"
    stroke-dashoffset="-31"
    pathLength="81.68"
    transform="rotate(-90 18 18)"
  />

  <!-- Tail bite: where the green segment meets the red start (top of circle, 12 o'clock)
       The green end lands at rotate(-90) + (81.68/81.68)*360 = top again.
       We drop a solid green dot there to signify the "bite". -->
  <circle cx="18" cy="5" r="2" fill="#22c55e"/>
  <!-- Halo -->
  <circle cx="18" cy="5" r="4" fill="#22c55e" fill-opacity="0.2"/>

  <!-- Interior negative-space play triangle ▶
       Inscribed to suggest forward progress.
       Vertices tuned to sit inside the loop ring. -->
  <path d="M11.5 13.2 L24.8 18 L11.5 22.8 Z"
    fill="#22c55e" fill-opacity="0.22"/>

  <!-- ─────────────────────────────────────────────────
       WORDMARK SECTION  x-start: 42
  ──────────────────────────────────────────────────── -->

  <!-- Thin vertical rule separating mark from text -->
  <line x1="38" y1="5" x2="38" y2="35" stroke="#2a2a2d" stroke-width="0.75"/>

  <!-- "CUIT" — monospace, heavy, crisp -->
  <text
    x="44" y="18"
    font-family="'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace"
    font-size="17" font-weight="700" letter-spacing="0.07em"
    dominant-baseline="middle"
    fill="#fafaf7"
  >CUIT</text>

  <!-- "complex-ui-tester" subtitle -->
  <text
    x="44.5" y="27.5"
    font-family="'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace"
    font-size="5.6" font-weight="400" letter-spacing="0.14em"
    fill="#52525b"
  >complex-ui-tester</text>

  <!-- Scan-line trace accent: red→green gradient bar, 2px tall -->
  <defs>
    <linearGradient id="trace-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="38%"  stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="38.1%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect x="44" y="31.5" width="88" height="1.2" rx="0.6" fill="url(#trace-grad)"/>
</svg>
