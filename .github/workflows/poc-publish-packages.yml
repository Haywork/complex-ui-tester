name: poc publish packages

on:
  push:
    branches: [main]
    paths:
      - "proof-of-concept/packages/**/package.json"
      - ".github/workflows/poc-publish-packages.yml"
  workflow_dispatch:

concurrency:
  group: poc-publish-packages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish all @haywork/cuit-* packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.14.2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@haywork"

      - name: Build and publish all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd proof-of-concept

          PACKAGES=(
            cuit-types
            cuit-harness
            cuit-recorder
            cuit-spec-gen
            adapter-jam
            cuit-mcp-local
          )

          pnpm install --frozen-lockfile
          # build:publish — only packages we npm publish; avoids pulling runner/
          # adapter-cuit dev graph (composite refs race → TS6305).
          pnpm run build:publish

          for pkg in "${PACKAGES[@]}"; do
            echo "Publishing @haywork/${pkg}..."
            pnpm --filter "@haywork/${pkg}" publish --no-git-checks --access restricted
          done
