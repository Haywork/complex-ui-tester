name: Marketing site bug
description: Report a bug on the marketing site (Vercel-deployed Next.js app).
title: "site: <short summary>"
labels: ["marketing-site", "bug"]
body:
  - type: input
    id: url
    attributes:
      label: URL where it happens
      placeholder: "https://..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to see?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What did you see instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: "Chrome 128 on macOS 15.1"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Cosmetic — visual nit"
        - "Functional — feature broken but page loads"
        - "Page broken — content unreadable"
        - "Page down — 5xx or blank screen"
    validations:
      required: true
